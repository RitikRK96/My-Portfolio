<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Naruto orange gradient: warm orange to fiery red -->
    <linearGradient id="narutoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="50%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Subtle warm text gradient for the cursor underscore -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffd9b3" />
    </linearGradient>

    <!-- Orange glow filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="248" fill="#0a0a0f" />

  <!-- Glowing orange border ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#narutoGradient)" stroke-width="14" filter="url(#glow)" opacity="0.9" />

  <!-- Terminal prompt: > symbol -->
  <path
    d="M 108 148 L 240 256 L 108 364"
    fill="none"
    stroke="url(#narutoGradient)"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Underscore cursor: _ -->
  <line
    x1="268" y1="364"
    x2="404" y2="364"
    stroke="url(#textGradient)"
    stroke-width="40"
    stroke-linecap="round"
    filter="url(#glow)"
  />
</svg>
