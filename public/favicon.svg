<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient for the border/glow combining cyber cyan, neon purple, and Naruto orange -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="50%" stop-color="#7800ff" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
    
    <!-- Warm text/cursor gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffd9b3" />
    </linearGradient>
    
    <!-- Premium drop shadows and glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Sleek outer border with radial glow -->
  <circle cx="256" cy="256" r="230" fill="#050508" stroke="url(#borderGradient)" stroke-width="16" filter="url(#glow)" />
  
  <!-- Inner design - high tech glowing terminal prompt -->
  <g transform="translate(126, 126)">
    <!-- > prompt symbol -->
    <path d="M 40 60 L 150 130 L 40 200" fill="none" stroke="url(#borderGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <!-- _ blinking cursor block -->
    <line x1="170" y1="200" x2="240" y2="200" stroke="url(#textGradient)" stroke-width="28" stroke-linecap="round" />
  </g>
</svg>
